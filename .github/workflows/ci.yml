name: CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Java
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build
        run: ./gradlew --no-daemon build

  kind-smoke:
    name: kind Smoke
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-kind-smoke')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Java
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Set up kind
        uses: helm/kind-action@v1.12.0
        with:
          install_only: true

      - name: Run kind smoke test
        run: just smoke-kind
