version: '3.8'

services:
  # ==========================================
  # Frontend (React SPA, served by nginx behind Traefik at the site root)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      args:
        # Public, non-secret build config (07b slide 25). Keycloak stays reachable at the
        # host-facing 8081 for the browser redirect; API is same-origin via the gateway.
        VITE_KEYCLOAK_ISSUER: http://localhost:8081/realms/eurotransit
        VITE_KEYCLOAK_CLIENT_ID: eurotransit-frontend
        VITE_API_BASE: /api
    image: eurotransit/frontend:local
    container_name: eurotransit-frontend
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      # Lowest priority: API routers (/api/*) match first; the SPA catches everything else.
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"

  # ==========================================
  # Application Services
  # ==========================================
  catalog:
    build:
      context: .
      args:
        SERVICE: catalog
    image: eurotransit/catalog:local
    container_name: eurotransit-catalog
    environment:
      SERVER_PORT: 8080
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081/realms/eurotransit
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/eurotransit/protocol/openid-connect/certs
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catalog.rule=PathPrefix(`/api/catalog`)"
      - "traefik.http.routers.catalog.entrypoints=web"
      - "traefik.http.services.catalog.loadbalancer.server.port=8080"

  orders:
    build:
      context: .
      args:
        SERVICE: orders
    image: eurotransit/orders:local
    container_name: eurotransit-orders
    environment:
      SERVER_PORT: 8080
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_HEALTH_R2DBC_ENABLED: "false"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      # DB connection parts: application.yaml composes BOTH the R2DBC (runtime) and the
      # Flyway (startup/JDBC) URLs from these. Setting only SPRING_R2DBC_URL would leave
      # Flyway on its localhost default and it would fail to connect. See conventions.md.
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: eurotransit
      DB_USER: eurotransit
      DB_PASSWORD: password
      # In-network broker (compose PLAINTEXT listener); without it the producer falls back
      # to localhost, which does not resolve inside a container.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081/realms/eurotransit
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/eurotransit/protocol/openid-connect/certs
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orders.rule=PathPrefix(`/api/orders`)"
      - "traefik.http.routers.orders.entrypoints=web"
      - "traefik.http.routers.orders.middlewares=local-auth-boundary@docker"
      - "traefik.http.middlewares.local-auth-boundary.headers.customrequestheaders.X-EuroTransit-Auth-Boundary=service-enforced-local-keycloak"
      - "traefik.http.services.orders.loadbalancer.server.port=8080"

  inventory:
    build:
      context: .
      args:
        SERVICE: inventory
    image: eurotransit/inventory:local
    container_name: eurotransit-inventory
    environment:
      SERVER_PORT: 8080
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_HEALTH_R2DBC_ENABLED: "false"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/eurotransit
      SPRING_R2DBC_USERNAME: eurotransit
      SPRING_R2DBC_PASSWORD: password
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081/realms/eurotransit
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/eurotransit/protocol/openid-connect/certs
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=false"

  payments:
    build:
      context: .
      args:
        SERVICE: payments
    image: eurotransit/payments:local
    container_name: eurotransit-payments
    environment:
      SERVER_PORT: 8080
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081/realms/eurotransit
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/eurotransit/protocol/openid-connect/certs
    expose:
      - "8080"
    labels:
      - "traefik.enable=false"

  notifications:
    build:
      context: .
      args:
        SERVICE: notifications
    image: eurotransit/notifications:local
    container_name: eurotransit-notifications
    environment:
      SERVER_PORT: 8080
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"
      # In-network broker address (the compose PLAINTEXT listener). Without this,
      # the consumer falls back to localhost, which does not resolve inside a container.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081/realms/eurotransit
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/eurotransit/protocol/openid-connect/certs
    expose:
      - "8080"
    depends_on:
      - kafka
    labels:
      - "traefik.enable=false"

  # ==========================================
  # Infrastructure Services
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: eurotransit-postgres
    environment:
      POSTGRES_USER: eurotransit
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eurotransit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eurotransit -d eurotransit"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: eurotransit-kafka
    environment:
      # KRaft settings
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # Listeners
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Standalone settings
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      # Cluster ID (required for KRaft)
      - CLUSTER_ID=Mk3OEYBSD34fcwNTJENDM2Qk
    ports:
      - "9094:9094" # Expose for local IDE access
    volumes:
      - kafka_data:/var/lib/kafka/data

  traefik:
    image: traefik:v2.10
    container_name: eurotransit-traefik
    command:
      - "--api.insecure=true" # Enable dashboard on port 8080
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"     # API Gateway entrypoint
      - "8080:8080" # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    labels:
      - "traefik.enable=false"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: eurotransit-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./infrastructure/local/keycloak:/opt/keycloak/data/import


  # ==========================================
  # Local Observability Stack
  # ==========================================
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: eurotransit-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tempo:
    image: grafana/tempo:2.7.2
    container_name: eurotransit-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "4318:4318" # OTLP HTTP ingest
      - "3200:3200" # Tempo query API
    volumes:
      - ./docker/observability/tempo.yaml:/etc/tempo/tempo.yaml:ro

  grafana:
    image: grafana/grafana:11.6.1
    container_name: eurotransit-grafana
    environment:
      # Local development only: no login screen.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo

volumes:
  postgres_data:
  kafka_data:
