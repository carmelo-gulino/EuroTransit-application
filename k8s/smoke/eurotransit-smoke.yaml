apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-smoke
  namespace: eurotransit-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: test
            - name: POSTGRES_PASSWORD
              value: test
            - name: POSTGRES_DB
              value: eurotransit
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "test"]
            initialDelaySeconds: 2
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-smoke
  namespace: eurotransit-smoke
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
