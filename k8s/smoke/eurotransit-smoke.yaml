apiVersion: v1
kind: Namespace
metadata:
  name: eurotransit-smoke
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: eurotransit-smoke
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/part-of: eurotransit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/part-of: eurotransit
    spec:
      containers:
        - name: catalog
          image: eurotransit/catalog:smoke
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED
              value: "false"
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://postgres-smoke:5432/eurotransit"
            - name: SPRING_R2DBC_USERNAME
              value: "test"
            - name: SPRING_R2DBC_PASSWORD
              value: "test"
            - name: SPRING_FLYWAY_URL
              value: "jdbc:postgresql://postgres-smoke:5432/eurotransit"
            - name: SPRING_FLYWAY_USER
              value: "test"
            - name: SPRING_FLYWAY_PASSWORD
              value: "test"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: eurotransit-smoke
spec:
  selector:
    app.kubernetes.io/name: catalog
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
