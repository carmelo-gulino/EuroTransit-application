server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No secrets served here — static assets only. CSP/HSTS/security headers are set at
    # the gateway (Traefik middleware), not per-app, per 07b slides 21 & 28.
}
