spring:
  reactor:
    context-propagation: auto
  application:
    name: payments
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/eurotransit}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8081/realms/eurotransit/protocol/openid-connect/certs}
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eurotransit}
    username: ${DB_USER:eurotransit}
    password: ${DB_PASSWORD:password}
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eurotransit}
    user: ${DB_USER:eurotransit}
    password: ${DB_PASSWORD:password}
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8085

management:
  otlp:
    metrics:
      export:
        enabled: false

payments:
  provider:
    sandbox-url: ${STRIPE_SANDBOX_URL:https://api.stripe.com/v1}
    secret-key: ${STRIPE_SECRET_KEY:sk_test_1234567890}
