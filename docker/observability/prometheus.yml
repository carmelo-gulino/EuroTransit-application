global:
  scrape_interval: 5s

scrape_configs:
  - job_name: eurotransit-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081
        labels:
          service: catalog
      - targets:
          - host.docker.internal:8082
        labels:
          service: inventory
      - targets:
          - host.docker.internal:8083
        labels:
          service: notifications
      - targets:
          - host.docker.internal:8084
        labels:
          service: orders
      - targets:
          - host.docker.internal:8085
        labels:
          service: payments
